<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend - Página Inicial</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #222;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        padding: 1rem;
        text-align: center;
        overflow: hidden;
        border: 2px solid;
        user-select: none;
      }

      h1 {
        color: #0248ca;
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 1.2rem;
        color: #fff;
        margin: 0.3rem 0;
      }

      code {
        background-color: #cccccca1;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 1rem;
        color: #fff;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 2rem;
        }

        p {
          font-size: 1rem;
        }

        code {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <h1>WELCOME TO BACKEND DE SALÃO BUTA CORTE</h1>
    <p>Essa rota não existe no backend.</p>
    <p>Se esperava uma API, verifique se a URL está correta.</p>
    <p>
      vai para <code>/ping</code> para verificar se o backend esta em pleno
      funcionamentos
    </p>
  </body>
</html>
